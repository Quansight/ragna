version: "3"

services:
  queue:
    image: "redis:alpine"
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 6

  worker:
    build:
      context: .
      dockerfile: Dockerfile-pydatanyc2023
    depends_on:
      queue:
        condition: service_healthy
    env_file: .env
    environment:
      - "RAGNA_CORE_QUEUE_URL=redis://queue:6379"
    command:
      - ragna
      - worker
    volumes:
      - "/tmp/ragna/documents:/var/ragna/documents"

  api:
    build:
      context: .
      dockerfile: Dockerfile-pydatanyc2023
    depends_on:
      - worker
    env_file: .env
    environment:
      - "RAGNA_CORE_QUEUE_URL=redis://queue:6379"
      - "RAGNA_API_URL=http://0.0.0.0:31476"
      - 'RAGNA_API_ORIGINS=["*"]'
    #      - "RAGNA_API_ORIGINS=[\"http://localhost:31477\", \"http://ui:31477\"]"
    command:
      - ragna
      - api
      - --no-start-worker
    ports:
      - "31476:31476"
    healthcheck:
      test: ["CMD", "curl", "http://0.0.0.0:31476"]
      interval: 5s
      timeout: 2s
      retries: 6
    volumes:
      - "/tmp/ragna/documents:/var/ragna/documents"

  ui:
    build:
      context: .
      dockerfile: Dockerfile-pydatanyc2023
    depends_on:
      api:
        condition: service_healthy
    environment:
      - "RAGNA_API_URL=http://api:31476"
      - "RAGNA_UI_URL=http://0.0.0.0:31477"
      - 'RAGNA_UI_ORIGINS=["http://localhost:31477"]'
    env_file: .env
    command:
      - ragna
      - ui
      - --no-start-api
    ports:
      - "31477:31477"
    healthcheck:
      test: ["CMD", "curl", "http://0.0.0.0:31477/health"]
      interval: 5s
      timeout: 2s
      retries: 6
